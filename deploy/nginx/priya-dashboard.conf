# =========================================================================
# Full-stack host nginx (bare-metal alternative to the dockerized `web`).
# Serves the built dashboard SPA and reverse-proxies /api -> FastAPI (:8080).
# Use this only if you run the API/agent via systemd instead of the `web`
# compose service. Copy the built frontend to /var/www/priya-dashboard.
#
#   server_name is set to the droplet IP; add a domain later + certbot for TLS.
# =========================================================================

upstream priya_api {
    server 127.0.0.1:8080;
    keepalive 16;
}

# Restrict /api/metrics to localhost / monitoring only.
geo $metrics_allowed {
    default 0;
    127.0.0.1/32 1;
    10.0.0.0/8   1;
}

server {
    listen 80;
    server_name 168.144.208.3 _;

    root /var/www/priya-dashboard;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Block metrics scraping from the public internet.
    location = /api/metrics {
        if ($metrics_allowed = 0) { return 403; }
        proxy_pass http://priya_api/metrics;
    }

    # API reverse proxy (strip /api -> backend root).
    location /api/ {
        proxy_pass http://priya_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 10m;   # CSV lead imports
    }

    # Content-hashed assets — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
