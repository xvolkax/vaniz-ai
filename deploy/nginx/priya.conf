# Nginx reverse proxy for the Priya API control-plane.
# TLS terminates here; the FastAPI service listens on 127.0.0.1:8080.
# The LiveKit media/SIP path does NOT go through nginx — it goes directly to
# LiveKit Cloud / your LiveKit server. This proxy is only for the ops API.

upstream priya_api {
    server 127.0.0.1:8080;
    keepalive 16;
}

# Restrict /metrics to your monitoring network only.
geo $metrics_allowed {
    default 0;
    10.0.0.0/8      1;
    127.0.0.1/32    1;
}

server {
    listen 80;
    server_name api.your-domain.com;

    # Redirect all HTTP to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/api.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Basic hardening
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 1m;

    location /healthz {
        proxy_pass http://priya_api;
        access_log off;
    }

    location /readyz {
        proxy_pass http://priya_api;
        access_log off;
    }

    location /metrics {
        if ($metrics_allowed = 0) { return 403; }
        proxy_pass http://priya_api;
    }

    location / {
        proxy_pass http://priya_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
