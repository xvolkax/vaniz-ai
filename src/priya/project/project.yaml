# ---------------------------------------------------------------------------
# PROJECT CATALOG (one builder, many projects) — TWO-TIER schema.
#
# Loaded ONCE at startup; the WHOLE thing is injected into the LLM context.
# NO retrieval / RAG at runtime — the model answers directly from this.
#
# TIER 1 (shared): facts that are the SAME for every project — statutory
#   charges (GST, stamp duty), legal defaults, builder credibility, loan banks,
#   plot rules. Stated ONCE to keep the prompt small (low latency).
# TIER 2 (per-project): only what actually VARIES (price, location, possession,
#   carpet area, amenities...).
#
# Keep values short and speakable — they are read out on a phone call.
# Override the path with the PROJECT_DATA_PATH env var.
# ---------------------------------------------------------------------------

# ===== TIER 1: shared builder / company info =====
builder_name: "Patna Realty"            # edit to your company name
region: "Patna aur aas-paas (Hajipur, Bihta, Sonpur, Naubatpur)"
builder_description: "Patna aur aas-paas ke ilaakon mein apartments aur RERA-approved residential plots ke projects."

# Builder credibility (buyers check track record / delay penalty)
years_in_business: "15+ saal"
completed_projects: "22+ projects Patna, Hajipur aur aas-paas mein time par delivered"
track_record: "On-time possession ka strong record, RERA-compliant delivery"
penalty_clause: "RERA ke mutabik possession delay par buyer ko interest/penalty milta hai (agreement mein clause hai)"

# Contact / follow-up
site_visit_contact: "+91 98860 12345"
whatsapp_number: "+91 98860 12345"
brochure_available: true

# Finance (common across projects)
loan_banks:
  - "SBI"
  - "HDFC"
  - "ICICI"
  - "Axis Bank"
  - "LIC Housing Finance"
emi_estimate: "80 lakh loan, ~8.5% par 20 saal = lagbhag 69,000 rupaye/month EMI"

# Cost break-up (statutory in Bihar — same for all projects)
cost_breakup:
  gst: "Under-construction par 5% GST; ready-to-move / OC-received units par GST nahi lagta"
  stamp_duty_registration: "Bihar mein stamp duty 6% (mahila khareedar 5%) + registration ~2% — yaani lagbhag 8% (mahila ~7%) extra"
  hidden_charges: "Floor rise, PLC (corner/park-facing), clubhouse membership aur parking charges alag ho sakte hain; final quote mein sab clearly bataya jaata hai"

# Legal status (common)
legal:
  title: "Sabhi projects clear aur marketable title par; koi legal dispute nahi"
  approvals: "Building plan, layout aur zaroori municipal approvals complete"
  oc_cc: "Possession ke samay OC/CC (Occupancy/Completion Certificate) diya jaata hai"

# Plot rules (common to all PLOT projects)
plot_info:
  registry: "Full payment par turant registry"
  mutation: "Registry ke baad dakhil-kharij (mutation) mein poori help ki jaati hai"
  land_use: "Residential use ke liye NA-converted, RERA-approved layouts"
  govt_approval: "Sabhi plots par zaroori government approvals maujood hain"

# Market / investment note (for appreciation & resale questions)
market_note: "Patna mein Bailey Road, Kankarbagh aur Danapur high-demand aur achhe resale ke liye jaane jaate hain; Bihta, Sonpur aur Naubatpur ke plots highway/expressway growth ke chalte long-term appreciation ke liye achhe hain"

